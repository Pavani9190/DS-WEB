<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 09 - Card com Rodapé</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <main class="container d-flex justify-content-center">
        <div class="card" style="width: 18rem;">
            <img src="https://placehold.co/600x400" class="card-img-top" alt="Imagem do Card">
            <div class="card-body">
              <h5 class="card-title">Título do Card</h5>
              <p class="card-text">Algum texto rápido para descrever o conteúdo do card.</p>
              <a href="#" class="btn btn-primary">Saiba Mais</a>
            </div>
            <div class="card-footer">
                <small class="text-muted">Atualizado em 2025</small>
            </div>
          </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
